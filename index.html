<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hashdex Daily Digest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@400&family=Public+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --hd-sophisticated-blue: #112539;
            --hd-sophisticated-slate: #181E1E;
            --hd-ocean-blue: #4D98F1;
            --hd-ocean-blue-hover: #3A82D9;
            --hd-subtle-beige: #F5F3EE;
            --hd-subtle-blue: #E8EEF5;
            --hd-teal: #3DB8A0;
            --hd-coral: #E57373;
            --hd-white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Public Sans', Arial, sans-serif;
            background: var(--hd-subtle-beige);
            color: var(--hd-sophisticated-slate);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Subtle geometric background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(circle at 15% 25%, rgba(77,152,241,0.04) 0%, transparent 50%),
                radial-gradient(circle at 85% 75%, rgba(61,184,160,0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            padding: 24px;
        }

        /* Header */
        .header {
            background: var(--hd-sophisticated-blue);
            border-radius: 16px 16px 0 0;
            padding: 40px 40px 32px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--hd-ocean-blue), var(--hd-teal));
        }

        .logo-container {
            margin-bottom: 28px;
        }

        .logo-container svg {
            width: 180px;
            height: auto;
            opacity: 0.95;
        }

        .header h1 {
            font-family: 'PT Serif', Georgia, serif;
            font-weight: 400;
            font-size: 26px;
            color: var(--hd-white);
            letter-spacing: 0;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            font-weight: 300;
            line-height: 1.5;
        }

        /* Card body */
        .card {
            background: var(--hd-white);
            padding: 36px 40px 40px;
            border-radius: 0 0 16px 16px;
            box-shadow: 0 4px 24px rgba(17,37,57,0.06);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 28px;
            border-radius: 8px;
            overflow: hidden;
            border: 1.5px solid var(--hd-subtle-blue);
        }

        .tab {
            flex: 1;
            padding: 12px 16px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: var(--hd-white);
            color: var(--hd-sophisticated-slate);
            transition: all 0.2s ease;
        }

        .tab:first-child { border-right: 1.5px solid var(--hd-subtle-blue); }

        .tab.active {
            background: var(--hd-sophisticated-blue);
            color: var(--hd-white);
        }

        .tab:not(.active):hover {
            background: var(--hd-subtle-blue);
        }

        /* Digest selector */
        .digest-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 24px;
        }

        .digest-options label {
            font-size: 13px;
            font-weight: 400;
            color: var(--hd-sophisticated-slate);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 12px 14px;
            border-radius: 8px;
            border: 1.5px solid #E2E6EB;
            transition: all 0.15s ease;
        }

        .digest-options label:hover {
            border-color: var(--hd-ocean-blue);
            background: rgba(77,152,241,0.03);
        }

        .digest-options input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--hd-ocean-blue);
            flex-shrink: 0;
        }

        .digest-name {
            font-weight: 500;
            display: block;
        }

        .digest-desc {
            font-size: 12px;
            color: #8A94A0;
            display: block;
            margin-top: 2px;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label.field-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--hd-sophisticated-slate);
            margin-bottom: 8px;
        }

        .email-input-group {
            display: flex;
            align-items: center;
            border: 1.5px solid #E2E6EB;
            border-radius: 8px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            overflow: hidden;
        }

        .email-input-group:focus-within {
            border-color: var(--hd-ocean-blue);
            box-shadow: 0 0 0 3px rgba(77,152,241,0.1);
        }

        .email-input-group input[type="text"] {
            flex: 1;
            min-width: 0;
            padding: 13px 0 13px 16px;
            border: none;
            font-family: 'Public Sans', Arial, sans-serif;
            font-size: 15px;
            color: var(--hd-sophisticated-slate);
            outline: none;
            background: transparent;
        }

        .email-input-group input[type="text"]::placeholder {
            color: #B8BFC7;
        }

        .email-suffix {
            padding: 13px 16px 13px 2px;
            font-family: 'Public Sans', Arial, sans-serif;
            font-size: 15px;
            color: #8A94A0;
            white-space: nowrap;
            user-select: none;
            pointer-events: none;
        }

        /* Submit button */
        .btn-submit {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-family: 'Public Sans', Arial, sans-serif;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-subscribe {
            background: var(--hd-ocean-blue);
            color: var(--hd-white);
        }

        .btn-subscribe:hover { background: var(--hd-ocean-blue-hover); }

        .btn-unsubscribe {
            background: var(--hd-white);
            color: var(--hd-coral);
            border: 1.5px solid var(--hd-coral);
        }

        .btn-unsubscribe:hover {
            background: rgba(229,115,115,0.06);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Feedback messages */
        .feedback {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            text-align: center;
            line-height: 1.4;
        }

        .feedback.success {
            background: rgba(61,184,160,0.08);
            color: #2A8F7A;
            border: 1px solid rgba(61,184,160,0.2);
            display: block;
        }

        .feedback.error {
            background: rgba(229,115,115,0.08);
            color: #C05050;
            border: 1px solid rgba(229,115,115,0.2);
            display: block;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #A0A8B2;
        }

        /* Responsive */
        @media (max-width: 560px) {
            .container { padding: 16px; }
            .header { padding: 32px 24px 24px; }
            .card { padding: 28px 24px 32px; }
            .header h1 { font-size: 22px; }
        }
    </style>
</head>

            </div>
            <h1>Daily Digest</h1>
            <p>Mantenha-se atualizado com as notícias que importam</p>
        </div>

        <!-- Card body -->
        <div class="card">
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab active" data-action="subscribe" onclick="switchTab('subscribe')">Inscrever-se</button>
                <button class="tab" data-action="unsubscribe" onclick="switchTab('unsubscribe')">Cancelar inscrição</button>
            </div>

            <!-- Digest selection -->
            <div class="digest-options">
                <label>
                    <input type="checkbox" id="digest-market" value="market" checked>
                    <span>
                        <span class="digest-name">📊 Market Digest</span>
                        <span class="digest-desc">Mercados, cripto, geopolítica e macro (seg a sex, 7:15 BRT)</span>
                    </span>
                </label>
                <label>
                    <input type="checkbox" id="digest-ai" value="ai">
                    <span>
                        <span class="digest-name">🤖 AI Digest</span>
                        <span class="digest-desc">Inteligência artificial, modelos e aplicações (seg a sex, 7:30 BRT)</span>
                    </span>
                </label>
            </div>

            <!-- Email input -->
            <div class="form-group">
                <label class="field-label" for="email">Email corporativo</label>
                <div class="email-input-group">
                    <input type="text" id="email" placeholder="nome" autocomplete="username" spellcheck="false">
                    <span class="email-suffix">@hashdex.com</span>
                </div>
            </div>

            <!-- Submit button -->
            <button class="btn-submit btn-subscribe" id="submitBtn" onclick="handleSubmit()">
                Inscrever-se
            </button>

            <!-- Feedback -->
            <div class="feedback" id="feedback"></div>
        </div>

        <div class="footer">
            Hashdex &mdash; Crypto Asset Management
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIGURATION
        // Replace this URL with your deployed Google Apps Script Web App URL
        // ============================================================
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzUPt5FjXrzEYC9CSI_meoTspvwN5Hj5fb1YrRzqib38H0oLXmbV5F318CWLRYR857UJQ/exec';

        let currentAction = 'subscribe';

        function switchTab(action) {
            currentAction = action;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-action="${action}"]`).classList.add('active');

            const btn = document.getElementById('submitBtn');
            btn.className = 'btn-submit ' + (action === 'subscribe' ? 'btn-subscribe' : 'btn-unsubscribe');
            btn.textContent = action === 'subscribe' ? 'Inscrever-se' : 'Cancelar inscrição';

            clearFeedback();
        }

        function clearFeedback() {
            const fb = document.getElementById('feedback');
            fb.className = 'feedback';
            fb.style.display = 'none';
        }

        function showFeedback(message, type) {
            const fb = document.getElementById('feedback');
            fb.textContent = message;
            fb.className = `feedback ${type}`;
            fb.style.display = 'block';
        }

        function getSelectedDigests() {
            const digests = [];
            if (document.getElementById('digest-market').checked) digests.push('market');
            if (document.getElementById('digest-ai').checked) digests.push('ai');
            return digests;
        }

        async function handleSubmit() {
            const username = document.getElementById('email').value.trim().toLowerCase().replace(/@.*$/, '');
            const email = username + '@hashdex.com';
            const digests = getSelectedDigests();
            const btn = document.getElementById('submitBtn');

            // Validation
            if (!username) {
                showFeedback('Por favor, insira seu nome de usuário.', 'error');
                return;
            }

            if (!/^[a-z0-9._-]+$/.test(username)) {
                showFeedback('Nome de usuário inválido. Use apenas letras, números, pontos ou hífens.', 'error');
                return;
            }

            if (digests.length === 0) {
                showFeedback('Selecione ao menos um digest.', 'error');
                return;
            }

            // Submit
            btn.disabled = true;
            btn.textContent = 'Processando...';
            clearFeedback();

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: currentAction,
                        email: email,
                        digests: digests
                    })
                });

                // With no-cors mode, we can't read the response
                // so we show an optimistic success message
                if (currentAction === 'subscribe') {
                    showFeedback(
                        `✓ Inscrição enviada para ${email}. Você receberá o próximo digest!`,
                        'success'
                    );
                } else {
                    showFeedback(
                        `✓ Solicitação de cancelamento enviada para ${email}.`,
                        'success'
                    );
                }

                document.getElementById('email').value = '';

            } catch (err) {
                showFeedback('Erro ao processar. Tente novamente ou contate o administrador.', 'error');
                console.error('Submit error:', err);
            } finally {
                btn.disabled = false;
                btn.textContent = currentAction === 'subscribe' ? 'Inscrever-se' : 'Cancelar inscrição';
            }
        }

        // Enter key support
        document.getElementById('email').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleSubmit();
        });
    </script>
</body>
